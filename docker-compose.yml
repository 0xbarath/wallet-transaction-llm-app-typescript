version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wallet-tx-postgres
    environment:
      POSTGRES_DB: wallet_tx
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: wallet
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wallet -d wallet_tx']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
